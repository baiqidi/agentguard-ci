name: SANS FIND EVIL Evidence

on:
  push:
    branches:
      - main
      - codex/sans-find-evil
  pull_request:
  workflow_dispatch:

jobs:
  sans-find-evil:
    name: Validate SANS FIND EVIL submission evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SANS readiness gate
        run: npm run sans:check

      - name: Upload SANS evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: sans-find-evil-evidence
          path: |
            agentguard-runs/sans-find-evil/
            agentguard-runs/sans-agent-adapters/
            agentguard-runs/sans-demo-video/
            architecture_diagram_sans.md
            docs/submission/sans-find-evil-submission-copy.md
            docs/submission/sans-find-evil-judge-readiness.md
