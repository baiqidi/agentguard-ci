name: SANS FIND EVIL Evidence

on:
  push:
    branches:
      - main
      - codex/sans-find-evil
  pull_request:
  workflow_dispatch:

jobs:
  sans-find-evil:
    name: Validate SANS FIND EVIL submission evidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Run SANS local fixture runner
        run: node scripts/run-sans-sift-ir-demo.mjs --output-dir agentguard-runs/sans-find-evil

      - name: Run SANS adapter suite
        run: >
          node --input-type=module
          -e "process.env.AGENTGUARD_CONTEST='sans'; await import('./packages/agent-adapters/dist/suite-cli.js')"
          --
          --output-dir agentguard-runs/sans-agent-adapters

      - name: Prepare SANS video assets
        run: npm run video:prep:sans

      - name: Verify SANS readiness gate
        run: node scripts/verify-sans-find-evil-submission.mjs

      - name: Upload SANS evidence bundle
        uses: actions/upload-artifact@v4
        with:
          name: sans-find-evil-evidence
          path: |
            agentguard-runs/sans-find-evil/
            agentguard-runs/sans-agent-adapters/
            agentguard-runs/sans-demo-video/
            architecture_diagram_sans.md
            docs/submission/sans-find-evil-submission-copy.md
            docs/submission/sans-find-evil-judge-readiness.md
