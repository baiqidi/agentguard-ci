name: AgentGuard Evidence

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  reliability-evidence:
    name: Reliability evidence
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run reliability suite
        run: npm run agentguard:suite

      - name: Run agent adapter suite
        run: npm run agentguard:agent-suite

      - name: Check submission readiness
        run: npm run submission:check

      - name: Check hackathon packaging
        run: npm run hackathons:check

      - name: Upload AgentGuard evidence
        uses: actions/upload-artifact@v5
        with:
          name: agentguard-evidence
          path: agentguard-runs
