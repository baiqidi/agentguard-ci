name: AgentGuard Evidence

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  reliability-evidence:
    name: Reliability evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run positive reliability scenarios
        run: |
          npm run agentguard:scenario -- --scenario frontend-contract
          npm run agentguard:scenario -- --scenario backend-triage

      - name: Run governance guardrail scenarios
        run: |
          npm run agentguard:scenario -- --scenario test-integrity-guard
          npm run agentguard:scenario -- --scenario unsafe-diff-guard

      - name: Upload AgentGuard evidence
        uses: actions/upload-artifact@v4
        with:
          name: agentguard-evidence
          path: agentguard-runs
