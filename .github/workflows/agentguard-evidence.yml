name: AgentGuard Evidence

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  reliability-evidence:
    name: Reliability evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run reliability suite
        run: npm run agentguard:suite

      - name: Upload AgentGuard evidence
        uses: actions/upload-artifact@v5
        with:
          name: agentguard-evidence
          path: agentguard-runs
