name: DeveloperWeek CI Gate

on:
  push:
    branches:
      - main
      - codex/developerweek-ny
  pull_request:
  workflow_dispatch:

jobs:
  developerweek-ci-gate:
    name: Regenerate DeveloperWeek AgentGuard evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DeveloperWeek submission gate
        run: npm run developerweek:check

      - name: Upload DeveloperWeek evidence
        uses: actions/upload-artifact@v4
        with:
          name: developerweek-agentguard-evidence
          path: |
            agentguard-runs/developerweek-agent-adapters/
            docs/submission/developerweek-new-york-judge-readiness.md
