[agentguard_review_gate]
is_custom = 1
label = AgentGuard Review Gate
description = Convert a Splunk alert into a reviewable AgentGuard evidence envelope before analysts or agents change state.
payload_format = json
python.version = python3
alert.execute.cmd = agentguard_review_gate.py
param.review_owner = Security Review
param.risk_label = suppression-change
param.required_evidence = alert-sample,suppression-rationale,security-reviewer-approval
param.output_path = $SPLUNK_HOME/var/run/splunk/agentguard-review-envelope.json
