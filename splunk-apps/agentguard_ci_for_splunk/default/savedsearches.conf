[AGCI SOC Pending Review]
search = | inputlookup agentguard_ci_soc_demo.csv | search risk_state=needs_review OR risk_state=blocked | table alert_id scenario_id source_surface action review_owner evidence_status risk_points
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 0

[AGCI Evidence Coverage]
search = | inputlookup agentguard_ci_soc_demo.csv | stats count by evidence_status
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 0

[AGCI Review Queue Owners]
search = | inputlookup agentguard_ci_soc_demo.csv | search risk_state=needs_review OR risk_state=blocked | stats count by review_owner
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 0

[AGCI Suppression Review Gate]
search = | inputlookup agentguard_ci_soc_demo.csv | search scenario_id="security-soc-alert-suppression" | head 1 | table scenario_id alert_id search_job_id review_owner evidence_status action risk_points approval_required source_surface
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.track = 1
alert_type = always
action.agentguard_review_gate = 1
action.agentguard_review_gate.param.review_owner = Security Review
action.agentguard_review_gate.param.risk_label = suppression-change
action.agentguard_review_gate.param.required_evidence = alert-sample,suppression-rationale,security-reviewer-approval
action.agentguard_review_gate.param.output_path = $SPLUNK_HOME/var/run/splunk/agentguard-review-envelope.json
